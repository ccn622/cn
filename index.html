<script>

const ws = new WebSocket(
  'wss://price-live.a1269136698b.workers.dev'
);

ws.onmessage = (e) => {

  const json = JSON.parse(e.data);

  if (json.type !== 'market') return;

  const m = json.market || {};

  if (m['黄金']) {
    document.getElementById('gold').innerText =
      m['黄金'].r;
  }

  if (m['白银']) {
    document.getElementById('silver').innerText =
      m['白银'].r;
  }

  if (json.t) {
    document.getElementById('time').innerText =
      json.t;
  }
};

ws.onerror = () => {
  console.log('ws错误');
};

ws.onclose = () => {
  console.log('ws关闭');
};

</script>
