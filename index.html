<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>实时金价</title>

  <style>
    body{
      background:#111;
      color:#fff;
      font-size:28px;
      padding:30px;
      font-family:sans-serif;
    }

    .box{
      margin-bottom:20px;
    }
  </style>
</head>

<body>

<div class="box">
  黄金：<span id="gold">--</span>
</div>

<div class="box">
  白银：<span id="silver">--</span>
</div>

<div class="box">
  时间：<span id="time">--</span>
</div>

<script>

const ws = new WebSocket(
  'wss://price-live.a1269136698b.workers.dev'
);

ws.onmessage = (e) => {

  const json = JSON.parse(e.data);

  if (json.type !== 'market') return;

  const m = json.market || {};

  if (m['黄金']) {
    document.getElementById('gold').innerText =
      m['黄金'].r;
  }

  if (m['白银']) {
    document.getElementById('silver').innerText =
      m['白银'].r;
  }

  if (json.t) {
    document.getElementById('time').innerText =
      json.t;
  }
};

ws.onerror = () => {
  console.log('ws错误');
};

ws.onclose = () => {
  console.log('ws关闭');
};

</script>

</body>
</html>
