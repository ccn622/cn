<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>实时贵金属行情</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#111;
    color:#fff;
    font-family:sans-serif;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.card{
    background:#1d1d1d;
    border-radius:12px;
    padding:20px;
    text-align:center;
}

.name{
    font-size:18px;
    color:#aaa;
}

.price{
    font-size:32px;
    margin-top:10px;
    font-weight:bold;
}

#time{
    margin-top:30px;
    text-align:center;
    color:#888;
    font-size:14px;
}

#status{
    text-align:center;
    margin-bottom:20px;
    color:#0f0;
}

</style>
</head>

<body>

<h1>实时贵金属行情</h1>

<div id="status">连接中...</div>

<div class="grid">

<div class="card">
<div class="name">黄金</div>
<div class="price" id="gold">--</div>
</div>

<div class="card">
<div class="name">白银</div>
<div class="price" id="silver">--</div>
</div>

<div class="card">
<div class="name">铂金</div>
<div class="price" id="platinum">--</div>
</div>

<div class="card">
<div class="name">钯金</div>
<div class="price" id="palladium">--</div>
</div>

<div class="card">
<div class="name">Au999</div>
<div class="price" id="au999">--</div>
</div>

<div class="card">
<div class="name">18K</div>
<div class="price" id="k18">--</div>
</div>

<div class="card">
<div class="name">Pt950</div>
<div class="price" id="pt950">--</div>
</div>

<div class="card">
<div class="name">Pd990</div>
<div class="price" id="pd990">--</div>
</div>

</div>

<div id="time">--</div>

<script>

let ws;

function connectWS(){

    document.getElementById("status").innerText =
        "连接中...";

    ws = new WebSocket(
        "wss://price-live.a1269136698b.workers.dev"
    );

    ws.onopen = () => {

        document.getElementById("status").innerText =
            "已连接";

    };

    ws.onmessage = (e) => {

        try{

            const data = JSON.parse(e.data);

            if(data["黄金"] !== undefined)
                document.getElementById("gold").innerText =
                    data["黄金"];

            if(data["白银"] !== undefined)
                document.getElementById("silver").innerText =
                    data["白银"];

            if(data["铂金"] !== undefined)
                document.getElementById("platinum").innerText =
                    data["铂金"];

            if(data["钯金"] !== undefined)
                document.getElementById("palladium").innerText =
                    data["钯金"];

            if(data["Au999"] !== undefined)
                document.getElementById("au999").innerText =
                    data["Au999"];

            if(data["18K"] !== undefined)
                document.getElementById("k18").innerText =
                    data["18K"];

            if(data["Pt950"] !== undefined)
                document.getElementById("pt950").innerText =
                    data["Pt950"];

            if(data["Pd990"] !== undefined)
                document.getElementById("pd990").innerText =
                    data["Pd990"];

            if(data["时间"])
                document.getElementById("time").innerText =
                    data["时间"];

        }catch(err){}

    };

    ws.onclose = () => {

        document.getElementById("status").innerText =
            "连接断开，重连中...";

        setTimeout(() => {
            connectWS();
        }, 1000);

    };

    ws.onerror = () => {

        document.getElementById("status").innerText =
            "连接错误";

    };

}

connectWS();

</script>

</body>
</html>
