<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>实时贵金属行情</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#111;
    color:#fff;
    font-family:sans-serif;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

#status{
    text-align:center;
    margin-bottom:20px;
    color:#0f0;
    font-size:14px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.card{
    background:#1d1d1d;
    border-radius:12px;
    padding:20px;
    text-align:center;
}

.name{
    font-size:18px;
    color:#aaa;
}

.price{
    font-size:32px;
    margin-top:10px;
    font-weight:bold;
}

#time{
    margin-top:25px;
    text-align:center;
    color:#888;
    font-size:14px;
}

</style>
</head>

<body>

<h1>实时贵金属行情</h1>

<div id="status">连接中...</div>

<div class="grid">

<div class="card">
<div class="name">黄金</div>
<div class="price" id="gold">--</div>
</div>

<div class="card">
<div class="name">白银</div>
<div class="price" id="silver">--</div>
</div>

<div class="card">
<div class="name">铂金</div>
<div class="price" id="platinum">--</div>
</div>

<div class="card">
<div class="name">钯金</div>
<div class="price" id="palladium">--</div>
</div>

<div class="card">
<div class="name">Au999</div>
<div class="price" id="au999">--</div>
</div>

<div class="card">
<div class="name">18K</div>
<div class="price" id="k18">--</div>
</div>

<div class="card">
<div class="name">Pt950</div>
<div class="price" id="pt950">--</div>
</div>

<div class="card">
<div class="name">Pd990</div>
<div class="price" id="pd990">--</div>
</div>

</div>

<div id="time">--</div>

<script>

let ws;

let lastTimeText = "";
let lastTimeUpdate = Date.now();

function connectWS(){

    document.getElementById("status").innerText =
        "连接中...";

    ws = new WebSocket(
        "wss://ws.wwog.qzz.io"
    );

    ws.onopen = () => {

        document.getElementById("status").innerText =
            "已连接";

        lastTimeUpdate = Date.now();
    };

    ws.onmessage = (e) => {

        try{

            const data = JSON.parse(e.data);

            // 心跳包
            if(data.type === "ping"){
                lastTimeUpdate = Date.now();
                return;
            }

            // 时间更新
            if(data["时间"]){

                document.getElementById("time").innerText =
                    data["时间"];

                if(data["时间"] !== lastTimeText){

                    lastTimeText = data["时间"];

                    lastTimeUpdate = Date.now();
                }
            }

            // 黄金
            if(data["黄金"] !== undefined){

                const g = parseFloat(data["黄金"]);

                document.getElementById("gold").innerText =
                    g.toFixed(2);

                document.getElementById("au999").innerText =
                    (g * 0.999).toFixed(2);

                document.getElementById("k18").innerText =
                    (g * 0.7475).toFixed(2);
            }

            // 白银
            if(data["白银"] !== undefined){

                document.getElementById("silver").innerText =
                    parseFloat(data["白银"]).toFixed(2);
            }

            // 铂金
            if(data["铂金"] !== undefined){

                const p = parseFloat(data["铂金"]);

                document.getElementById("platinum").innerText =
                    p.toFixed(2);

                document.getElementById("pt950").innerText =
                    (p * 0.942).toFixed(2);
            }

            // 钯金
            if(data["钯金"] !== undefined){

                const d = parseFloat(data["钯金"]);

                document.getElementById("palladium").innerText =
                    d.toFixed(2);

                document.getElementById("pd990").innerText =
                    (d * 0.9499).toFixed(2);
            }

        }catch(err){}

    };

    ws.onerror = () => {

        document.getElementById("status").innerText =
            "连接错误";

    };

    ws.onclose = () => {

        document.getElementById("status").innerText =
            "连接断开";

    };

}

// 每3秒检查一次是否假死

setInterval(() => {

    const diff =
        Date.now() - lastTimeUpdate;

    // 超过8秒
    if(diff > 8000){

        document.getElementById("status").innerText =
            "数据延迟中...";
    }

    // 超过15秒
    if(diff > 15000){

        document.getElementById("status").innerText =
            "数据卡死，页面重载中...";

        // 彻底刷新页面
        setTimeout(() => {

            location.reload();

        }, 1000);
    }

}, 3000);

connectWS();

</script>

</body>
</html>
